aid: renewable-energy-group
name: Renewable Energy Group
kind: company
description: >-
  Renewable Energy Group (REG) is a North American producer of biodiesel and
  renewable diesel, founded with biodiesel operations dating to 1996 and
  formally established as a separate company in 2006, with headquarters in
  Ames, Iowa. REG operated as a publicly traded company on Nasdaq under the
  ticker REGI until February 28, 2022, when Chevron Corporation announced
  the acquisition of REG for approximately $3.15 billion; the deal closed
  on June 13, 2022, and REG now operates as a wholly owned subsidiary of
  Chevron under the Chevron Renewable Energy Group brand at chevron-reg.com.
  REG operates a fleet of biorefineries across the United States and Europe,
  producing biodiesel, renewable diesel, and related lower-carbon fuel
  products from a diversified mix of feedstocks including used cooking oil,
  inedible animal fats, distillers corn oil, and vegetable oils. As of this
  profile, neither REG nor the Chevron Renewable Energy Group subsidiary
  publishes a public consumer-facing developer API, OpenAPI specification,
  SDK, CLI, or GitHub organization; customer, supplier, distributor, and
  feedstock-partner integrations are handled through Chevron Renewable
  Energy Group sales, supply, and supplier-relations channels.
